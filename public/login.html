<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — StockBridge</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0d0f; --card: #12171a; --border: rgba(255,255,255,0.07);
      --accent: #00e5a0; --danger: #ff5757; --text: #e8ecea; --muted: #7a8b85;
      --font-head: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
      --glow: 0 0 40px rgba(0,229,160,0.12);
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); display: grid; place-items: center; min-height: 100vh; }
    
    .auth-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 40px; width: 100%; max-width: 400px; box-shadow: var(--glow); position: relative; }
    .logo { text-align: center; font-family: var(--font-head); font-weight: 800; font-size: 1.5rem; margin-bottom: 24px; color: var(--text); }
    .logo span { color: var(--accent); }
    h2 { font-size: 1.25rem; margin-bottom: 6px; text-align: center; }
    p.sub { color: var(--muted); font-size: 0.875rem; text-align: center; margin-bottom: 24px; }
    
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
    .form-group input { width: 100%; padding: 12px 14px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--font-body); font-size: 0.9rem; outline: none; transition: border-color .2s; }
    .form-group input:focus { border-color: var(--accent); }
    
    .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-family: var(--font-head); font-weight: 700; font-size: 0.9rem; transition: opacity .2s; margin-top: 8px; }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .error-msg { color: var(--danger); font-size: 0.8rem; text-align: center; margin-top: 12px; min-height: 18px; }
    
    .step { display: none; }
    .step.active { display: block; }

    .modal-close { position: absolute; top: 20px; right: 24px; background: none; border: none; color: var(--muted); font-size: 1.4rem; cursor: pointer; text-decoration: none; }
    .modal-close:hover { color: var(--text); }
  </style>
</head>
<body>

  <div class="auth-card">
    <a href="/" class="modal-close">✕</a>
    <div class="logo">Stock<span>Bridge</span></div>

    <div class="step active" id="step-email">
      <h2>Welcome Back</h2>
      <p class="sub">Enter your email to sign in or get started.</p>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email-input" placeholder="you@example.com" />
      </div>
      <button class="btn btn-primary" onclick="checkEmail()" id="btn-email">Continue</button>
      <div class="error-msg" id="err-email"></div>
    </div>

    <div class="step" id="step-login">
      <h2>Enter Password</h2>
      <p class="sub" id="login-sub"></p>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-pwd" placeholder="••••••••" />
      </div>
      <button class="btn btn-primary" onclick="login()" id="btn-login">Sign In</button>
      <div class="error-msg" id="err-login"></div>
      <div style="text-align:center; margin-top:12px;"><a href="#" style="color:var(--muted); font-size:0.8rem;" onclick="location.reload()">← Back</a></div>
    </div>

    <div class="step" id="step-setup">
      <h2>Create Your Password</h2>
      <p class="sub">Your account is approved! Set a strong password to secure your account.</p>
      <div class="form-group">
        <label>New Password</label>
        <input type="password" id="setup-pwd" placeholder="At least 8 characters" />
      </div>
      <button class="btn btn-primary" onclick="setupPassword()" id="btn-setup">Create Password & Login</button>
      <div class="error-msg" id="err-setup"></div>
    </div>

  </div>

  <script>
    let currentEmail = '';

    async function checkEmail() {
      const email = document.getElementById('email-input').value.trim();
      const errEl = document.getElementById('err-email');
      const btn = document.getElementById('btn-email');
      
      if (!email) return errEl.textContent = 'Please enter your email.';
      
      errEl.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Checking...';
      
      try {
        const res = await fetch('/api/auth/check-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        
        const data = await res.json();
        
        if (!res.ok) throw new Error(data.error || 'Server error');
        
        // No longer checking for data.approved - everyone is approved
        
        currentEmail = email;
        document.getElementById('step-email').classList.remove('active');
        
        if (data.hasPassword) {
          document.getElementById('step-login').classList.add('active');
          document.getElementById('login-sub').textContent = email;
          document.getElementById('login-pwd').focus();
        } else {
          document.getElementById('step-setup').classList.add('active');
          document.getElementById('setup-pwd').focus();
        }
      } catch (err) {
        errEl.textContent = err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Continue';
      }
    }

    async function login() {
      const password = document.getElementById('login-pwd').value;
      const errEl = document.getElementById('err-login');
      const btn = document.getElementById('btn-login');
      
      if (!password) return errEl.textContent = 'Enter your password.';
      
      errEl.textContent = '';
      btn.disabled = true;
      
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: currentEmail, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        
        window.location.href = '/dashboard.html';
      } catch (err) {
        errEl.textContent = err.message;
        btn.disabled = false;
      }
    }

    async function setupPassword() {
      const password = document.getElementById('setup-pwd').value;
      const errEl = document.getElementById('err-setup');
      const btn = document.getElementById('btn-setup');
      
      if (password.length < 8) return errEl.textContent = 'Password must be at least 8 characters.';
      
      errEl.textContent = '';
      btn.disabled = true;
      
      try {
        const res = await fetch('/api/auth/setup-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: currentEmail, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        
        window.location.href = '/dashboard.html';
      } catch (err) {
        errEl.textContent = err.message;
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
